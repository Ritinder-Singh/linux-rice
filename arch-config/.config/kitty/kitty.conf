# ── Font ──────────────────────────────────────────────────────────────────────
font_family               MonaspaceNeon Nerd Font
font_size                 13.0

# ── Transparency ──────────────────────────────────────────────────────────────
# Blur is handled by Hyprland window rules
background_opacity        0.92
dynamic_background_color  yes

# ── Window ────────────────────────────────────────────────────────────────────
window_padding_width      12
hide_window_decorations   yes
confirm_os_window_close   0

# ── Cursor ────────────────────────────────────────────────────────────────────
cursor_shape              beam
cursor_blink_interval     0.5

# ── Scrollback ────────────────────────────────────────────────────────────────
scrollback_lines          10000

# ── Bell ──────────────────────────────────────────────────────────────────────
enable_audio_bell         no

# ── Tab bar ───────────────────────────────────────────────────────────────────
tab_bar_edge              bottom
tab_bar_style             powerline
tab_powerline_style       slanted

# ── URLs ──────────────────────────────────────────────────────────────────────
url_style                 curly
open_url_with             zen

# ── Performance ───────────────────────────────────────────────────────────────
repaint_delay             10
input_delay               3
sync_to_monitor           yes

# ── Shell integration ─────────────────────────────────────────────────────────
shell_integration         enabled

# ── Colors: Rose Pine Moon (fallback — Matugen overrides at runtime) ──────────
foreground              #e0def4
background              #232136
selection_foreground    #e0def4
selection_background    #44415a

