# ── Hyprland Main Config ──────────────────────────────────────────────────────
# Source modular files
source = ~/.config/hypr/keybinds.conf
source = ~/.config/hypr/rules.conf

# ── NVIDIA Environment Variables ──────────────────────────────────────────────
env = LIBVA_DRIVER_NAME,nvidia
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = WLR_NO_HARDWARE_CURSORS,1

# ── Session ───────────────────────────────────────────────────────────────────
env = EDITOR,nvim
env = VISUAL,nvim
env = TERMINAL,kitty
env = BROWSER,zen
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# ── Monitor ───────────────────────────────────────────────────────────────────
# Auto-detect display — adjust if needed after install
monitor = ,preferred,auto,1

# ── General ───────────────────────────────────────────────────────────────────
general {
    gaps_in          = 6
    gaps_out         = 6
    border_size      = 2
    col.active_border   = rgba(88aaeeee)
    col.inactive_border = rgba(33334400)
    layout           = dwindle
    resize_on_border = true
}

# ── Decoration ────────────────────────────────────────────────────────────────
decoration {
    rounding = 6

    blur {
        enabled           = true
        size              = 8
        passes            = 3
        xray              = false
        noise             = 0.0117
        contrast          = 0.8916
        brightness        = 0.8172
        vibrancy          = 0.1696
        vibrancy_darkness = 0.0
    }

    shadow {
        enabled      = true
        range        = 20
        render_power = 3
        color        = rgba(1a1a2eee)
    }

    dim_inactive = true
    dim_strength = 0.05
}

# ── Animations ────────────────────────────────────────────────────────────────
animations {
    enabled = true

    bezier = smooth,   0.05, 0.9,  0.1,  1.05
    bezier = snappy,   0.25, 0.46, 0.45, 0.94
    bezier = overshot, 0.13, 0.99, 0.29, 1.1

    animation = windows,     1, 4,  smooth,  slide
    animation = windowsOut,  1, 4,  snappy,  slide
    animation = border,      1, 10, default
    animation = borderangle, 1, 8,  default
    animation = fade,        1, 4,  default
    animation = workspaces,  1, 5,  overshot, slidevert
}

# ── Layouts ───────────────────────────────────────────────────────────────────
dwindle {
    pseudotile     = true
    preserve_split = true
}

# ── Input ─────────────────────────────────────────────────────────────────────
input {
    kb_layout    = us
    follow_mouse = 1
    sensitivity  = 0

    touchpad {
        natural_scroll       = true
        disable_while_typing = true
        tap-to-click         = true
    }
}

# ── Misc ──────────────────────────────────────────────────────────────────────
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo   = true
    animate_manual_resizes  = true
}

# ── Autostart ─────────────────────────────────────────────────────────────────
exec-once = swww-daemon
exec-once = waybar
exec-once = swaync
exec-once = swayosd-server
exec-once = hypridle
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = blueman-applet
