# ── Keybinds ──────────────────────────────────────────────────────────────────
$mod = SUPER

# ── Core WM ───────────────────────────────────────────────────────────────────
bind = $mod, Return,     exec, kitty
bind = $mod, Q,          killactive
bind = $mod, Space,      exec, rofi -show drun
bind = $mod, E,          exec, kitty -e yazi
bind = $mod, F,          fullscreen, 0
bind = $mod, V,          togglefloating
bind = $mod, P,          pseudo

# ── Apps ──────────────────────────────────────────────────────────────────────
bind = $mod, B,          exec, zen-browser
bind = $mod, G,          exec, kitty -e lazygit
bind = $mod, N,          exec, kitty -e zellij

# ── Scratchpad: floating btm ──────────────────────────────────────────────────
bind = $mod, M,          exec, hyprctl dispatch togglespecialworkspace btm
bind = $mod, M,          exec, [[ $(hyprctl clients | grep "btm") ]] || kitty --class btm -e btm

# ── Navigation (vim-style) ────────────────────────────────────────────────────
bind = $mod, H,          movefocus, l
bind = $mod, J,          movefocus, d
bind = $mod, K,          movefocus, u
bind = $mod, L,          movefocus, r

# ── Move windows ──────────────────────────────────────────────────────────────
bind = $mod SHIFT, H,    movewindow, l
bind = $mod SHIFT, J,    movewindow, d
bind = $mod SHIFT, K,    movewindow, u
bind = $mod SHIFT, L,    movewindow, r

# ── Workspaces ────────────────────────────────────────────────────────────────
bind = $mod, 1,          workspace, 1
bind = $mod, 2,          workspace, 2
bind = $mod, 3,          workspace, 3
bind = $mod, 4,          workspace, 4
bind = $mod, 5,          workspace, 5
bind = $mod, 6,          workspace, 6
bind = $mod, 7,          workspace, 7
bind = $mod, 8,          workspace, 8
bind = $mod, 9,          workspace, 9

bind = $mod SHIFT, 1,    movetoworkspace, 1
bind = $mod SHIFT, 2,    movetoworkspace, 2
bind = $mod SHIFT, 3,    movetoworkspace, 3
bind = $mod SHIFT, 4,    movetoworkspace, 4
bind = $mod SHIFT, 5,    movetoworkspace, 5
bind = $mod SHIFT, 6,    movetoworkspace, 6
bind = $mod SHIFT, 7,    movetoworkspace, 7
bind = $mod SHIFT, 8,    movetoworkspace, 8
bind = $mod SHIFT, 9,    movetoworkspace, 9

# ── System ────────────────────────────────────────────────────────────────────
bind = $mod SHIFT, S,    exec, hyprshot -m region
bind = $mod SHIFT, W,    exec, ~/.config/hypr/scripts/wallpaper-picker.sh
bind = $mod SHIFT, T,    exec, ~/.config/hypr/scripts/toggle-theme.sh
bind = $mod SHIFT, R,    exec, hyprctl reload
bind = $mod SHIFT, E,    exit
bind = $mod SHIFT, L,    exec, hyprlock

# ── Volume (via swayosd) ──────────────────────────────────────────────────────
bind = , XF86AudioRaiseVolume,  exec, swayosd-client --output-volume raise
bind = , XF86AudioLowerVolume,  exec, swayosd-client --output-volume lower
bind = , XF86AudioMute,         exec, swayosd-client --output-volume mute-toggle
bind = , XF86AudioMicMute,      exec, swayosd-client --input-volume mute-toggle

# ── Brightness ────────────────────────────────────────────────────────────────
bind = , XF86MonBrightnessUp,   exec, swayosd-client --brightness raise
bind = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower

# ── Media ─────────────────────────────────────────────────────────────────────
bind = , XF86AudioPlay,  exec, playerctl play-pause
bind = , XF86AudioNext,  exec, playerctl next
bind = , XF86AudioPrev,  exec, playerctl prev

# ── Mouse binds ───────────────────────────────────────────────────────────────
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# ── Mouse scroll workspaces ───────────────────────────────────────────────────
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up,   workspace, e-1
