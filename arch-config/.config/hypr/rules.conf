# ── Window Rules (new syntax) ─────────────────────────────────────────────────

# Kitty — transparency + blur
windowrule = opacity 0.92 0.85, match:class ^(kitty)$

# Floating windows
windowrule = float, match:class ^(pavucontrol)$
windowrule = float, match:class ^(blueman-manager)$
windowrule = float, match:class ^(nm-connection-editor)$
windowrule = float, match:class ^(thunar)$, match:title ^(File Operation)
windowrule = float, match:class ^(keepassxc)$

# Center floating windows
windowrule = center, match:class ^(pavucontrol)$
windowrule = center, match:class ^(blueman-manager)$
windowrule = center, match:class ^(keepassxc)$

# Size floating windows
windowrule = size 800 500, match:class ^(pavucontrol)$
windowrule = size 900 600, match:class ^(keepassxc)$

# Rofi — no blur or shadow
windowrule = noblur,   match:class ^(rofi)$
windowrule = noshadow, match:class ^(rofi)$

# Android Studio
windowrule = tile, match:class ^(jetbrains-studio)$

# SwayNC — no focus steal
windowrule = nofocus, match:class ^(swaync-client)$

# Picture-in-picture
windowrule = float,        match:title ^(Picture.in.Picture)$
windowrule = pin,          match:title ^(Picture.in.Picture)$
windowrule = size 640 360, match:title ^(Picture.in.Picture)$
windowrule = move 100%-660 50, match:title ^(Picture.in.Picture)$

# ── Workspace Rules ───────────────────────────────────────────────────────────
workspace = 1, default:true
