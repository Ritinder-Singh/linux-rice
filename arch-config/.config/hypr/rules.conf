# ── Window Rules ──────────────────────────────────────────────────────────────

# Kitty — transparency + blur
windowrulev2 = opacity 0.92 0.85,        class:^(kitty)$

# Floating windows
windowrulev2 = float,                    class:^(pavucontrol)$
windowrulev2 = float,                    class:^(blueman-manager)$
windowrulev2 = float,                    class:^(nm-connection-editor)$
windowrulev2 = float,                    class:^(thunar)$, title:^(File Operation)
windowrulev2 = float,                    class:^(keepassxc)$

# Center floating windows
windowrulev2 = center,                   class:^(pavucontrol)$
windowrulev2 = center,                   class:^(blueman-manager)$
windowrulev2 = center,                   class:^(keepassxc)$

# Size floating windows
windowrulev2 = size 800 500,             class:^(pavucontrol)$
windowrulev2 = size 900 600,             class:^(keepassxc)$

# Rofi — no blur or shadow (handles its own)
windowrulev2 = noblur,                   class:^(rofi)$
windowrulev2 = noshadow,                 class:^(rofi)$

# Android Studio
windowrulev2 = tile,                     class:^(jetbrains-studio)$

# SwayNC popup — no focus steal
windowrulev2 = nofocus,                  class:^(swaync-client)$

# Picture-in-picture
windowrulev2 = float,                    title:^(Picture.in.Picture)$
windowrulev2 = pin,                      title:^(Picture.in.Picture)$
windowrulev2 = size 640 360,             title:^(Picture.in.Picture)$
windowrulev2 = move 100%-660 50,         title:^(Picture.in.Picture)$

# ── Workspace Rules ───────────────────────────────────────────────────────────
workspace = 1, default:true
