# ── Window Rules (new syntax) ─────────────────────────────────────────────────

# Kitty — transparency + blur
windowrule = opacity 0.92 0.85, match:class ^(kitty)$

# Floating windows
windowrule = float on, match:class ^(pavucontrol)$
windowrule = float on, match:class ^(blueman-manager)$
windowrule = float on, match:class ^(nm-connection-editor)$
windowrule = float on, match:class ^(thunar)$, match:title ^(File Operation)
windowrule = float on, match:class ^(keepassxc)$

# Center floating windows
windowrule = center 1, match:class ^(pavucontrol)$
windowrule = center 1, match:class ^(blueman-manager)$
windowrule = center 1, match:class ^(keepassxc)$

# Size floating windows
windowrule = size 800 500, match:class ^(pavucontrol)$
windowrule = size 900 600, match:class ^(keepassxc)$

# Android Studio
windowrule = tile on, match:class ^(jetbrains-studio)$

# Picture-in-picture
windowrule = float on,         match:title ^(Picture.in.Picture)$
windowrule = pin on,           match:title ^(Picture.in.Picture)$
windowrule = size 640 360,     match:title ^(Picture.in.Picture)$
windowrule = move 100%-660 50, match:title ^(Picture.in.Picture)$

# ── Workspace Rules ───────────────────────────────────────────────────────────
workspace = 1, default:true
