# ── Hyprlock ──────────────────────────────────────────────────────────────────

general {
    disable_loading_bar = true
    hide_cursor         = true
}

background {
    monitor      =
    path         = screenshot
    blur_passes  = 3
    blur_size    = 8
    brightness   = 0.5
}

input-field {
    monitor           =
    size              = 300, 50
    position          = 0, -80
    halign            = center
    valign            = center
    outline_thickness = 2
    dots_center       = true
    fade_on_empty     = true
    placeholder_text  =
    hide_input        = false
}

label {
    monitor   =
    text      = $TIME
    font_size = 64
    halign    = center
    valign    = center
    position  = 0, 80
}
